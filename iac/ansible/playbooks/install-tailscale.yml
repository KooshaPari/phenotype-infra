---
# install-tailscale.yml — bring tailscaled up with an ephemeral auth key.
# tailscale binary + tailscaled service are installed by common.yml.
# Requires: tailscale_authkey (ephemeral, from `tailscale admin`).

- name: Join Tailscale mesh
  hosts: oci_primary
  become: true
  vars:
    tailscale_hostname: oci-primary
    tailscale_tags: "tag:infra"
  tasks:
    - name: Ensure tailscaled running
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Check tailscale status
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false
      failed_when: false

    - name: tailscale up (idempotent)
      ansible.builtin.command: >
        tailscale up
        --authkey={{ tailscale_authkey }}
        --hostname={{ tailscale_hostname }}
        --advertise-tags={{ tailscale_tags }}
        --accept-routes
        --ssh
      when: ts_status.rc != 0 or '"BackendState":"NeedsLogin"' in ts_status.stdout or '"BackendState":"Stopped"' in ts_status.stdout
      no_log: true
