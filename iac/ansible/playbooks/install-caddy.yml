---
# install-caddy.yml — Caddy 2.x front proxy.
#
# DESIGN NOTE (flagged for user review):
#   Cloudflare DNS-01 requires the caddy-dns/cloudflare plugin, which is NOT
#   in the upstream `caddy` RPM. We have two options:
#     (A) Build a custom caddy binary via `xcaddy` (included below, default ON).
#     (B) Skip DNS-01 and let cloudflared terminate TLS publicly; Caddy speaks
#         plain http on 127.0.0.1:80 behind the tunnel.
#   This playbook implements (A) + the tunnel, giving you proper internal
#   TLS certs. Flip `caddy_use_xcaddy: false` to fall back to plain-http mode.

- name: Install Caddy (with caddy-dns/cloudflare via xcaddy)
  hosts: oci_primary
  become: true
  vars:
    caddy_use_xcaddy: true
    caddy_version: "2.8.4"
    go_version: "1.22.6"
    go_arch: arm64
  tasks:
    - name: Add COPR caddy repo (fallback for upstream rpm)
      ansible.builtin.yum_repository:
        name: caddy-stable
        description: Caddy stable RPM
        baseurl: https://dl.cloudsmith.io/public/caddy/stable/rpm/el/8/$basearch
        gpgcheck: true
        gpgkey: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        enabled: true
      when: not caddy_use_xcaddy

    - name: Install upstream caddy RPM
      ansible.builtin.dnf:
        name: caddy
        state: present
      when: not caddy_use_xcaddy

    # --- xcaddy path (default) ---
    - name: Install Go toolchain for xcaddy
      ansible.builtin.unarchive:
        src: "https://go.dev/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
        dest: /usr/local
        remote_src: true
        creates: /usr/local/go/bin/go
      when: caddy_use_xcaddy

    - name: Ensure /usr/local/go/bin in PATH for root
      ansible.builtin.copy:
        dest: /etc/profile.d/go.sh
        content: "export PATH=$PATH:/usr/local/go/bin:/root/go/bin\n"
        mode: "0644"
      when: caddy_use_xcaddy

    - name: Install xcaddy
      ansible.builtin.shell: |
        export PATH=$PATH:/usr/local/go/bin
        go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      args:
        creates: /root/go/bin/xcaddy
      environment:
        HOME: /root
        GOPATH: /root/go
      when: caddy_use_xcaddy

    - name: Build custom caddy with cloudflare DNS plugin
      ansible.builtin.shell: |
        export PATH=$PATH:/usr/local/go/bin:/root/go/bin
        xcaddy build v{{ caddy_version }} \
          --with github.com/caddy-dns/cloudflare \
          --output /usr/local/bin/caddy
      args:
        creates: /usr/local/bin/caddy
      environment:
        HOME: /root
        GOPATH: /root/go
      when: caddy_use_xcaddy

    - name: Create caddy system user
      ansible.builtin.user:
        name: caddy
        system: true
        shell: /sbin/nologin
        home: /var/lib/caddy
        create_home: true

    - name: Ensure /etc/caddy exists
      ansible.builtin.file:
        path: /etc/caddy
        state: directory
        owner: root
        group: caddy
        mode: "0750"

    - name: Template Caddyfile
      ansible.builtin.template:
        src: caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: caddy
        mode: "0640"
      notify: reload caddy

    - name: Install caddy systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/caddy.service
        mode: "0644"
        content: |
          [Unit]
          Description=Caddy
          Documentation=https://caddyserver.com/docs/
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=notify
          User=caddy
          Group=caddy
          EnvironmentFile=-/etc/caddy/caddy.env
          ExecStart=/usr/local/bin/caddy run --environ --config /etc/caddy/Caddyfile
          ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --force
          TimeoutStopSec=5s
          LimitNOFILE=1048576
          PrivateTmp=true
          ProtectSystem=full
          AmbientCapabilities=CAP_NET_BIND_SERVICE

          [Install]
          WantedBy=multi-user.target

    - name: Install caddy env file
      ansible.builtin.copy:
        dest: /etc/caddy/caddy.env
        owner: root
        group: caddy
        mode: "0640"
        content: |
          # Populated by ansible-vault or group_vars/oci_primary.yml
          CF_API_TOKEN={{ cf_api_token | default('<PLACEHOLDER_CF_API_TOKEN>') }}

    - name: Enable + start caddy
      ansible.builtin.systemd:
        name: caddy
        daemon_reload: true
        enabled: true
        state: started

  handlers:
    - name: reload caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
