[advisories]
db-path = "$CARGO_HOME/advisory-db"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "BSD-2-Clause",
  "CC0-1.0",
  "ISC",
  "Zlib",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
