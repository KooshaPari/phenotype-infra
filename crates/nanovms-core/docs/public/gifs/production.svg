<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1e1e1e" rx="8"/>
  <rect x="0" y="0" width="800" height="30" fill="#323232" rx="8"/>
  <circle cx="15" cy="15" r="6" fill="#ff5f56"/>
  <circle cx="35" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="55" cy="15" r="6" fill="#27c93f"/>
  <text x="400" y="20" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">nanovms - production</text>
  
  <!-- Terminal content -->
  <text x="20" y="60" fill="#0f0" font-family="monospace" font-size="14">$ cargo add nanovms</text>
  <text x="20" y="85" fill="#fff" font-family="monospace" font-size="14">    Updating crates.io index</text>
  <text x="20" y="110" fill="#fff" font-family="monospace" font-size="14">    Downloading nanovms v0.1.0</text>
  <text x="20" y="135" fill="#fff" font-family="monospace" font-size="14">    Compiling nanovms v0.1.0</text>
  <text x="20" y="160" fill="#0f0" font-family="monospace" font-size="14">✓ Installed successfully in 2.4s</text>
  
  <text x="20" y="200" fill="#0f0" font-family="monospace" font-size="14">$ nanovms --version</text>
  <text x="20" y="225" fill="#fff" font-family="monospace" font-size="14">nanovms 0.1.0</text>
  
  <text x="20" y="265" fill="#0f0" font-family="monospace" font-size="14">$ nanovms health</text>
  <text x="20" y="290" fill="#0f0" font-family="monospace" font-size="14">✓ Service: healthy</text>
  <text x="20" y="315" fill="#0f0" font-family="monospace" font-size="14">✓ Database: connected (2ms)</text>
  <text x="20" y="340" fill="#0f0" font-family="monospace" font-size="14">✓ Cache: operational (0.5ms)</text>
</svg>