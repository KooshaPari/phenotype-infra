# KVirtualStage Configuration

# Server configuration
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"
  
  # TLS configuration
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  
  # CORS configuration
  cors:
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["*"]
    exposed_headers: []
    allow_credentials: true
    max_age: 3600
  
  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst_size: 10
    cleanup_interval: "1m"
  
  # GraphQL configuration
  graphql:
    enabled: true
    playground: true
    introspection: true
    complexity_limit: 200
    depth_limit: 15
  
  # WebSocket configuration
  websocket:
    enabled: true
    read_buffer_size: 1024
    write_buffer_size: 1024
    ping_interval: "30s"
    pong_timeout: "10s"
    max_connections: 1000

# Database configuration
database:
  type: "postgres"
  host: "localhost"
  port: 5432
  database: "kvirtualstage"
  username: "kvs"
  password: "password"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: "1h"
  conn_max_idle_time: "15m"
  
  # Migration configuration
  migrations:
    enabled: true
    path: "./migrations"

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  password: ""
  database: 0
  pool_size: 10
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  idle_timeout: "5m"
  max_retries: 3

# Docker configuration
docker:
  host: "unix:///var/run/docker.sock"
  api_version: "1.41"
  cert_path: ""
  tls_verify: false
  timeout: "30s"
  network_name: "kvirtualstage"
  volume_base_path: "/var/lib/kvirtualstage/volumes"
  
  # Registry configuration
  registry:
    url: ""
    username: ""
    password: ""
  
  # Default images for different desktop environments
  default_images:
    ubuntu-xfce: "kvirtualstage/ubuntu-xfce:latest"
    ubuntu-gnome: "kvirtualstage/ubuntu-gnome:latest"
    kubuntu-kde: "kvirtualstage/kubuntu-kde:latest"
    windows-10: "kvirtualstage/windows-10:latest"
  
  # Resource limits
  resource_limits:
    default_cpu: 1.0
    default_memory: 1073741824  # 1GB
    default_disk: 5368709120    # 5GB
    max_cpu: 4.0
    max_memory: 8589934592      # 8GB
    max_disk: 21474836480       # 20GB

# Security configuration
security:
  # JWT configuration
  jwt:
    secret_key: "your-super-secret-jwt-key-change-this-in-production"
    token_duration: "24h"
    refresh_duration: "168h"  # 7 days
    issuer: "kvirtualstage"
    algorithm: "HS256"
  
  # Encryption configuration
  encryption:
    key: "your-32-byte-encryption-key-here"
    algorithm: "AES-256-GCM"
  
  # OAuth configuration
  oauth:
    enabled: false
    redirect_url: "http://localhost:8080/auth/callback"
    providers: {}
  
  # Session configuration
  session:
    default_duration: "8h"
    max_duration: "24h"
    max_sessions: 10
    cleanup_interval: "1h"
    auto_destroy: true
  
  # Audit configuration
  audit:
    enabled: true
    log_level: "info"
    output_path: "./logs/audit.log"
    retention: "90d"
  
  # IP whitelist/blacklist
  ip_whitelist: []
  ip_blacklist: []

# Recording configuration
recording:
  enabled: true
  output_path: "./recordings"
  default_format: "mp4"
  default_quality: "high"
  max_duration: "2h"
  max_file_size: 2147483648  # 2GB
  
  # Cleanup configuration
  cleanup:
    enabled: true
    retention: "30d"
    interval: "24h"
  
  # FFmpeg configuration
  ffmpeg:
    binary_path: "ffmpeg"
    hardware_accel: "auto"
    preset: "medium"
    crf: 23
    framerate: 30
    max_bitrate: "5M"
    video_codec: "libx264"
    audio_codec: "aac"
  
  # Format configurations
  formats:
    mp4:
      extension: "mp4"
      mime_type: "video/mp4"
      video_codec: "libx264"
      audio_codec: "aac"
      options:
        movflags: "+faststart"
    webm:
      extension: "webm"
      mime_type: "video/webm"
      video_codec: "libvpx-vp9"
      audio_codec: "libopus"
      options: {}
    gif:
      extension: "gif"
      mime_type: "image/gif"
      video_codec: "gif"
      audio_codec: ""
      options:
        filter_complex: "fps=15,scale=720:-1:flags=lanczos"

# Logging configuration
logging:
  level: "info"
  format: "json"
  output: ["stdout"]
  structured: true
  
  # File logging configuration
  file:
    path: "./logs/app.log"
    max_size: 100    # MB
    max_backups: 3
    max_age: 28      # days
    compress: true

# Metrics configuration
metrics:
  enabled: true
  path: "/metrics"
  interval: "15s"
  namespace: "kvirtualstage"
  subsystem: "api"