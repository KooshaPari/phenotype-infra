# Taskfile.yml for BytePort
# ------------------------------------------------------------------
# Hybrid task runner for BytePort's three engines:
#   - Go (backend/byteport + backend/nvms)         # primary backend
#   - TypeScript / SvelteKit (frontend/web)         # primary web frontend
#   - Rust / Tauri (frontend/web/src-tauri)        # desktop/mobile shell
#
# Spec: V3 DAG L2 #24 (BytePort Taskfile + justfile).
# Branch: chore/l2-24-taskfile-justfile-2026-06-11
# Author: L2 subagent #24 (2026-06-11)
#
# L1 audit context (`BytePort/STATUS_2026_06_10.md`):
#   - `cargo check` times out at 300s; L2 spec asks for 600s on `build`.
#   - `frontend/web/package.json` is missing a `test` script. Addressed
#     in this same PR by adding `"test": "vitest --run --coverage || echo no tests yet"`.
#
# This file REPLACES the prior cargo-only Taskfile (PR #87) with a
# hybrid Rust + Go + TS recipe set per V3 DAG L2 #24.
#
# Usage:
#   task --list          # show all tasks
#   task build           # cargo + go + npm build (600s timeout)
#   task test            # cargo test --no-run + go test + npm test
#   task lint            # cargo clippy + go vet + npm run lint
#   task ci              # run build, test, lint, fmt, deny, audit sequentially
# ------------------------------------------------------------------

version: '3'

vars:
  CARGO_FLAGS: --workspace
  FRONTEND_DIR: frontend/web
  BACKEND_DIR: backend/byteport

env:
  # Surface a consistent set of flags for downstream recipes. Override
  # with `task build CARGO_FLAGS=--release` if needed.
  RUST_BACKTRACE: '1'

tasks:
  default:
    desc: Show available tasks.
    cmds:
      - task --list

  # -- Build --------------------------------------------------------------

  build:
    desc: "Build everything: Rust workspace + Go backend + TS frontend."
    dir: .
    timeout: 600000  # 600s per L2 #24 spec (L1 audit: cargo check > 300s)
    deps: [build-rust, build-go, build-frontend]
    cmds:
      - cmd: echo "build all engines complete"

  build-rust:
    desc: "Build the Rust workspace (Tauri shell)."
    dir: .
    cmds:
      - cargo build {{.CARGO_FLAGS}}

  build-go:
    desc: "Build the Go backend (backend/byteport)."
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go build ./...

  build-frontend:
    desc: "Build the SvelteKit frontend (frontend/web)."
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run build

  # -- Test ---------------------------------------------------------------

  test:
    desc: |
      Test everything.
      - Rust: cargo test --no-run (per L1 audit, full `cargo test` is slow;
        this only compiles; full `cargo test` lives in `test-rust`).
      - Go:   go test ./... (backend/byteport).
      - TS:   npm test; falls back to `npm run check` if no `test` script.
    timeout: 600000
    deps: [test-frontend, test-go, test-rust-compile]

  test-frontend:
    desc: Run frontend (TS/SvelteKit) tests; falls back to `npm run check`.
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - |
        if grep -q '"test"\s*:' package.json; then
          echo "==> test-frontend: npm test"
          npm test
        else
          echo "==> test-frontend: no 'test' script; falling back to 'npm run check'"
          npm run check
        fi

  test-rust-compile:
    desc: Compile Rust tests without running them (fast sanity for CI).
    dir: .
    cmds:
      - cargo test {{.CARGO_FLAGS}} --no-run

  test-rust:
    desc: Run Rust tests (full execution; slow — matches L1 audit).
    dir: .
    timeout: 1200000  # 20 minutes; cargo test is slow per L1 audit
    cmds:
      - cargo test {{.CARGO_FLAGS}}

  test-go:
    desc: Run Go tests (backend/byteport).
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go test ./...

  test-go-race:
    desc: Run Go tests with the race detector.
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go test -race ./...

  # -- Lint ---------------------------------------------------------------

  lint:
    desc: "Lint everything: cargo clippy + go vet + npm run lint."
    deps: [lint-rust, lint-go, lint-frontend]

  lint-rust:
    desc: cargo clippy on the workspace (warnings are errors).
    dir: .
    cmds:
      - cargo clippy {{.CARGO_FLAGS}} -- -D warnings

  lint-go:
    desc: go vet on backend/byteport.
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go vet ./...

  lint-frontend:
    desc: npm run lint (prettier --check + eslint).
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run lint

  # -- Format check -------------------------------------------------------

  fmt:
    desc: "Check formatting: cargo fmt + gofmt + (npm run format:check if defined)."
    deps: [fmt-rust, fmt-go, fmt-frontend]

  fmt-rust:
    desc: cargo fmt --check on the workspace.
    dir: .
    cmds:
      - cargo fmt --all -- --check

  fmt-go:
    desc: gofmt -l on the Go modules (advisory).
    dir: .
    cmds:
      - |
        unformatted=$(gofmt -l backend/byteport backend/nvms 2>/dev/null || true)
        if [ -n "$unformatted" ]; then
          echo "::warning::The following Go files are not gofmt-clean:"
          echo "$unformatted"
          exit 1
        fi

  fmt-frontend:
    desc: prettier --check (or whatever frontend package.json exposes).
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - |
        if grep -q '"format:check"\s*:' package.json; then
          npm run format:check
        else
          npm run format -- --check
        fi

  fmt-fix:
    desc: Auto-format everything in place.
    cmds:
      - cargo fmt --all
      - cmd: gofmt -w backend/byteport backend/nvms
        ignore_error: true
      - cmd: npm run format
        dir: '{{.FRONTEND_DIR}}'

  # -- Deny / Audit -------------------------------------------------------

  deny:
    desc: Run cargo-deny against deny.toml (mirrors .github/workflows/cargo-deny.yml).
    cmds:
      - |
        if command -v cargo-deny >/dev/null 2>&1; then
          cargo deny check
        else
          echo "cargo-deny not installed; install with: cargo install cargo-deny"
          exit 1
        fi

  audit:
    desc: Run cargo-audit (mirrors .github/workflows/cargo-audit.yml).
    cmds:
      - |
        if command -v cargo-audit >/dev/null 2>&1; then
          cargo audit
        else
          echo "cargo-audit not installed; install with: cargo install cargo-audit"
          exit 1
        fi

  # -- CI aggregate -------------------------------------------------------

  ci:
    desc: "Full CI suite: build, test, lint, fmt, deny, audit sequentially."
    cmds:
      - task: build
      - task: test
      - task: lint
      - task: fmt
      - task: deny
      - task: audit
      - cmd: echo "ci all stages passed"

  # -- Hygiene ------------------------------------------------------------

  hygiene:
    desc: Repository hygiene checks (size caps, TODOs, governance file presence).
    cmds:
      - cmd: echo "hygiene oversized files"
      - |
        find backend frontend src docs \
          -type f \( -name "*.go" -o -name "*.rs" -o -name "*.ts" -o -name "*.svelte" -o -name "*.js" \) \
          -not -path "*/node_modules/*" -not -path "*/target/*" -not -path "*/.git/*" \
          -not -path "*/.svelte-kit/*" -not -path "*/build/*" -not -path "*/dist/*" \
          -size +20k 2>/dev/null \
          -exec wc -l {} \; | sort -rn | head -20
      - cmd: echo "hygiene active TODO markers"
      - |
        grep -rnE "todo!|TODO|FIXME|XXX|HACK|unimplemented!" \
          backend/byteport backend/nvms frontend/web/src frontend/web/src-tauri/src \
          --include="*.go" --include="*.rs" --include="*.ts" --include="*.svelte" \
          2>/dev/null | grep -v node_modules | grep -v target | head -20 || true
      - cmd: echo "hygiene governance file presence"
      - |
        for f in LICENSE LICENSE-MIT LICENSE-APACHE CHANGELOG.md CODEOWNERS CONTRIBUTING.md SECURITY.md .gitignore; do
          if [ -f "$f" ]; then
            echo "  $f: present"
          else
            echo "  $f: missing"
          fi
        done
      - cmd: echo "hygiene complete"

  # -- Frontend / Backend groups (for ergonomics) -------------------------

  frontend:
    desc: "Run all frontend (TS) tasks. Alias of: lint-frontend, test-frontend, build-frontend."
    deps: [lint-frontend, test-frontend, build-frontend]

  backend:
    desc: Run all backend (Go + Rust) tasks.
    deps: [build-go, build-rust, test-go, lint-go, lint-rust]

  # -- Convenience --------------------------------------------------------

  install:
    desc: Install JS dependencies (frontend/web).
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - |
        if command -v yarn >/dev/null 2>&1; then
          yarn install --frozen-lockfile
        else
          npm ci
        fi

  clean:
    desc: Clean build artifacts (target/, .svelte-kit/, build/, dist/).
    cmds:
      - cargo clean
      - rm -rf frontend/web/.svelte-kit frontend/web/build frontend/web/dist
      - rm -rf backend/byteport/tmp

  help:
    desc: Show this help text.
    cmds:
      - task --list

  coverage:
    desc: Measure code coverage (SSOT: see grade.sh for the canonical command).
    cmds:
      - cargo llvm-cov --workspace --fail-under-lines 85
