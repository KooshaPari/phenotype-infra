<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BytePort Android glass">
  <title>BytePort Android</title>
  <desc>Hand-authored Android-style neo-glass icon with BytePort port/socket mark and 2x4 byte dots.</desc>
  <defs>
    <clipPath id="clip">
      <rect x="0" y="0" width="512" height="512" rx="118" ry="118"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10201d"/>
      <stop offset="100%" stop-color="#090a0c"/>
    </linearGradient>
    <radialGradient id="blobA" cx="34%" cy="24%" r="42%">
      <stop offset="0%" stop-color="#7ebab5" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="76%" cy="74%" r="38%">
      <stop offset="0%" stop-color="#95ccc8" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <filter id="frost" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur"/>
    </filter>
    <linearGradient id="glass" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#95ccc8" stop-opacity="0.56"/>
      <stop offset="50%" stop-color="#7ebab5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0.44"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#blobA)"/>
    <rect width="512" height="512" fill="url(#blobB)"/>

    <circle cx="256" cy="256" r="192" fill="url(#glass)"/>
    <circle cx="256" cy="256" r="192" fill="#7ebab5" fill-opacity="0.17" filter="url(#frost)"/>
    <circle cx="256" cy="256" r="188" fill="none" stroke="#95ccc8" stroke-opacity="0.35" stroke-width="4"/>

    <g transform="translate(110 95) scale(0.6)">
      <rect x="98" y="90" width="336" height="352" rx="74" ry="74" fill="#090a0c" fill-opacity="0.18"/>
      <rect x="108" y="100" width="316" height="332" rx="68" ry="68" fill="#1f3e3a"/>
      <rect x="140" y="132" width="252" height="268" rx="56" ry="56" fill="#090a0c"/>
      <rect x="140" y="82" width="232" height="54" rx="28" ry="28" fill="#1f3e3a"/>
      <rect x="164" y="62" width="184" height="30" rx="15" ry="15" fill="#95ccc8" fill-opacity="0.58"/>
      <rect x="158" y="404" width="196" height="34" rx="17" ry="17" fill="#1f3e3a"/>
      <rect x="170" y="412" width="172" height="18" rx="9" ry="9" fill="#090a0c" fill-opacity="0.78"/>

      <rect x="182" y="140" width="148" height="16" rx="8" fill="#90d0cb" fill-opacity="0.15"/>
      <rect x="182" y="166" width="148" height="10" rx="5" fill="#7ebab5" fill-opacity="0.16"/>
      <rect x="182" y="186" width="148" height="7" rx="4" fill="#95ccc8" fill-opacity="0.20"/>
      <rect x="182" y="198" width="148" height="6" rx="3" fill="#7ebab5" fill-opacity="0.16"/>

      <g fill="#7ebab5">
        <circle cx="188" cy="236" r="12"/>
        <circle cx="232" cy="236" r="12"/>
        <circle cx="276" cy="236" r="12"/>
        <circle cx="320" cy="236" r="12"/>
        <circle cx="188" cy="272" r="12"/>
        <circle cx="232" cy="272" r="12"/>
        <circle cx="276" cy="272" r="12"/>
        <circle cx="320" cy="272" r="12"/>
      </g>
      <g fill="#95ccc8" opacity="0.80">
        <circle cx="200" cy="236" r="4"/>
        <circle cx="244" cy="236" r="4"/>
        <circle cx="288" cy="236" r="4"/>
        <circle cx="332" cy="236" r="4"/>
        <circle cx="200" cy="272" r="4"/>
        <circle cx="244" cy="272" r="4"/>
        <circle cx="288" cy="272" r="4"/>
        <circle cx="332" cy="272" r="4"/>
      </g>
      <circle cx="256" cy="254" r="130" fill="none" stroke="#95ccc8" stroke-opacity="0.32" stroke-width="2"/>
    </g>
  </g>

  <circle cx="130" cy="130" r="20" fill="#95ccc8" fill-opacity="0.26"/>
  <circle cx="382" cy="402" r="12" fill="#7ebab5" fill-opacity="0.24"/>
</svg>
