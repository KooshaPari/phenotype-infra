<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BytePort Windows">
  <title>BytePort Windows</title>
  <desc>Hand-authored Windows mica-style variant with stacked semi-opaque glass layers around the BytePort mark.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111d1b"/>
      <stop offset="100%" stop-color="#090a0c"/>
    </linearGradient>
    <radialGradient id="m1" cx="28%" cy="24%" r="40%">
      <stop offset="0%" stop-color="#7ebab5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m2" cx="75%" cy="78%" r="36%">
      <stop offset="0%" stop-color="#95ccc8" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="micaA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f262d"/>
      <stop offset="100%" stop-color="#11171e"/>
    </linearGradient>
    <linearGradient id="micaB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ebab5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7ebab5" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="micaC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f2f2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#95ccc8" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="22" result="n"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.035 0"/>
      <feBlend in="SourceGraphic" in2="n" mode="overlay"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="8" fill="url(#backdrop)"/>
  <rect x="24" y="24" width="464" height="464" rx="8" fill="url(#m1)"/>
  <rect x="24" y="24" width="464" height="464" rx="8" fill="url(#m2)"/>

  <g filter="url(#blur)">
    <rect x="24" y="24" width="464" height="464" rx="8" fill="url(#micaA)" opacity="0.95"/>
    <rect x="28" y="28" width="464" height="464" rx="8" fill="url(#micaB)" opacity="0.8"/>
    <rect x="36" y="32" width="452" height="456" rx="8" fill="url(#micaC)" opacity="0.85"/>
  </g>

  <rect x="20" y="20" width="472" height="472" rx="10" fill="none" stroke="#353a40" stroke-opacity="0.7" stroke-width="1.5"/>

  <rect x="24" y="24" width="464" height="464" rx="8" fill="url(#noise)"/>

  <g transform="translate(94 87) scale(0.72)">
    <rect x="98" y="90" width="336" height="352" rx="74" ry="74" fill="#172329" opacity="0.84"/>
    <rect x="108" y="100" width="316" height="332" rx="68" ry="68" fill="#1c2f2c"/>
    <rect x="140" y="132" width="252" height="268" rx="56" ry="56" fill="#090a0c"/>
    <rect x="140" y="82" width="232" height="54" rx="28" ry="28" fill="#1c2f2c"/>
    <rect x="164" y="62" width="184" height="30" rx="15" ry="15" fill="#95ccc8" fill-opacity="0.48"/>
    <rect x="158" y="404" width="196" height="34" rx="17" ry="17" fill="#1c2f2c"/>
    <rect x="170" y="412" width="172" height="18" rx="9" ry="9" fill="#090a0c" fill-opacity="0.72"/>
    <g fill="#7ebab5">
      <circle cx="188" cy="236" r="12"/>
      <circle cx="232" cy="236" r="12"/>
      <circle cx="276" cy="236" r="12"/>
      <circle cx="320" cy="236" r="12"/>
      <circle cx="188" cy="272" r="12"/>
      <circle cx="232" cy="272" r="12"/>
      <circle cx="276" cy="272" r="12"/>
      <circle cx="320" cy="272" r="12"/>
    </g>
    <g fill="#95ccc8" opacity="0.78">
      <circle cx="200" cy="236" r="4"/>
      <circle cx="244" cy="236" r="4"/>
      <circle cx="288" cy="236" r="4"/>
      <circle cx="332" cy="236" r="4"/>
      <circle cx="200" cy="272" r="4"/>
      <circle cx="244" cy="272" r="4"/>
      <circle cx="288" cy="272" r="4"/>
      <circle cx="332" cy="272" r="4"/>
    </g>
  </g>
</svg>
