      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <filter id="liquid" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="turbulence" baseFrequency="0.018 0.024" numOctaves="2" seed="42" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="24" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
    <linearGradient id="glass" x1="0.1" y1="0" x2="0.9" y2="1">
