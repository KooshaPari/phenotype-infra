      <stop offset="55%" stop-color="#7ebab5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0.48"/>
    </linearGradient>
    <linearGradient id="sweep" x1="1" y1="0" x2="0.2" y2="0.55">
