<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BytePort macOS">
  <title>BytePort macOS</title>
  <desc>Hand-authored macOS liquid-glass variant for the BytePort port/socket brand mark.</desc>
  <defs>
    <clipPath id="squircle">
      <path d="M256,36 C350,36 396,36 422,63 C448,90 492,136 492,256 C492,376 448,422 422,449 C396,476 350,476 256,476 C162,476 116,476 90,449 C64,422 20,376 20,256 C20,136 64,90 90,63 C116,36 162,36 256,36 Z"/>
    </clipPath>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#112f2c"/>
      <stop offset="50%" stop-color="#0e2422"/>
      <stop offset="100%" stop-color="#090a0c"/>
    </linearGradient>
    <radialGradient id="skyBlob" cx="72%" cy="24%" r="38%">
      <stop offset="0%" stop-color="#7ebab5" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skyBlob2" cx="20%" cy="80%" r="35%">
