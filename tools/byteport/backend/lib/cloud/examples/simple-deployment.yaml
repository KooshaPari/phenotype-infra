# Simple single-provider deployment example
# Deploy a container service on Render

version: "1.0"
environment: production

project:
  name: simple-api
  region: us-west-2
  tags:
    app: simple-api
    team: platform

providers:
  render:
    auth:
      type: api_key
      key_env: RENDER_API_KEY

resources:
  - name: api-server
    type: compute.container
    provider: render
    spec:
      runtime: docker
      dockerfile: ./Dockerfile
      port: 8080
      env:
        NODE_ENV: production
        LOG_LEVEL: info
      scale:
        min: 2
        max: 5
        target_cpu: 70
    deploy:
      strategy: rolling
      health_check:
        type: http
        path: /health
        port: 8080
        interval: 30s
        timeout: 5s
        retries: 3
        initial_delay: 15s
        success_threshold: 2
        failure_threshold: 3
      rollback:
        enabled: true
        max_retries: 2
        retry_interval: 30s
