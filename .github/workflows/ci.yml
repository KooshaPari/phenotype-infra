# phenotype-infra CI — Rust workspace build, test, lint, and format check
#
# Triggered on push/PR to main, and on-demand via workflow_dispatch.
# Runs against the root workspace Cargo.toml (not the iac/ sub-workspace).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: cargo (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Install Go (for nanovms-core build)
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: cargo fmt --check
        run: cargo fmt --workspace -- --check

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace
