name: ansible-lint

on:
  pull_request:
    paths:
      - "iac/ansible/**"
      - ".github/workflows/ansible-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ansible/ansible-lint@main
        with:
          working_directory: iac/ansible
