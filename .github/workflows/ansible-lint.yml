name: ansible-lint

on:
  pull_request:
    paths:
      - "iac/ansible/**"
      - ".github/workflows/ansible-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c  # was: @main
        with:
          working_directory: iac/ansible
