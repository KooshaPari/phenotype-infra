name: ansible-lint

on:
  pull_request:
    paths:
      - "iac/ansible/**"
      - ".github/workflows/ansible-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c  # was: @main
        with:
          working_directory: iac/ansible
