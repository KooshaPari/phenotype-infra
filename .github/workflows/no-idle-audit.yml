# ──────────────────────────────────────────────────────────
# No-Idle Audit — automated tick analysis  (Issue #89-R3)
# Runs daily + on push to main.  Uses scripts/no-idle-audit.py.
# On strict failure opens a labelled issue in the repo.
# ──────────────────────────────────────────────────────────
name: no-idle-audit

on:
  schedule:
    - cron: "17 6 * * 1"     # 06:17 UTC every Monday
  push:
    branches: [main]
    paths:
      - "worklogs/**"
      - "scripts/no-idle-audit.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run no-idle-audit.py (strict)"
        id: audit
        run: |
          python scripts/no-idle-audit.py --strict --markdown \
            2>&1 | tee /tmp/audit_report.md
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "Check for violations"
        id: check
        run: |
          grep -q "❌ FAIL" /tmp/audit_report.md \
            && echo "has_violations=true" >> "$GITHUB_OUTPUT" \
            || echo "has_violations=false" >> "$GITHUB_OUTPUT"

      - name: "Open / update tracker issue"
        if: steps.check.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = require('fs').readFileSync('/tmp/audit_report.md','utf8');

            // find existing open no-idle tracker
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'no-idle',
            });

            const body =
              `_Auto-generated by \`no-idle-audit.yml\` on ${new Date().toISOString()}_\n\n`
              + report;

            if (issues.length > 0) {
              const existing = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Updated existing tracker #${existing.number}`);
            } else {
              const {data: newIssue} = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `No-Idle Audit — ${new Date().toISOString().slice(0,10)}`,
                labels: ['no-idle','audit'],
                body,
              });
              console.log(`Created new tracker #${newIssue.number}`);
            }

      - name: "Upload report artifact"
        uses: actions/upload-artifact@v4
        with:
          name: no-idle-audit-report
          path: /tmp/audit_report.md
