name: cargo-deny
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
          manifest-path: iac/Cargo.toml
