name: Docs & Workflow Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vale:
    name: Vale (markdown prose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{"message":"Not Found","documentation_url":"https://docs.github.com/rest/commits/commits#get-a-commit","status":"404"}

      - name: Run Vale
        uses: errata-ai/vale-action@{"message":"Not Found","documentation_url":"https://docs.github.com/rest/commits/commits#get-a-commit","status":"404"}
        with:
          files: '["."]'
          filter_mode: nofilter
          fail_on_error: false
          reporter: github-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actionlint:
    name: actionlint (GitHub Actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{"message":"Not Found","documentation_url":"https://docs.github.com/rest/commits/commits#get-a-commit","status":"404"}

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color
