name: docs-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-check.yml"

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{"message":"Not Found","documentation_url":"https://docs.github.com/rest/commits/commits#get-a-commit","status":"404"}
      - uses: DavidAnson/markdownlint-cli2-action@{"message":"Not Found","documentation_url":"https://docs.github.com/rest/commits/commits#get-a-commit","status":"404"}
        with:
          globs: |
            README.md
            docs/**/*.md

  adr-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{"message":"Not Found","documentation_url":"https://docs.github.com/rest/commits/commits#get-a-commit","status":"404"}
      - name: Validate ADR headers
        run: |
          for f in docs/adr/*.md; do
            grep -q '^# ADR ' "$f" || { echo "::error file=$f::missing '# ADR NNN — Title' header"; exit 1; }
            grep -q '^- \*\*Status:\*\*' "$f" || { echo "::error file=$f::missing Status line"; exit 1; }
          done
