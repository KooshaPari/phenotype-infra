name: docs-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-check.yml"

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b
        with:
          globs: |
            README.md
            docs/**/*.md

  adr-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate ADR headers
        run: |
          for f in docs/adr/*.md; do
            grep -q '^# ADR ' "$f" || { echo "::error file=$f::missing '# ADR NNN — Title' header"; exit 1; }
            grep -q '^- \*\*Status:\*\*' "$f" || { echo "::error file=$f::missing Status line"; exit 1; }
          done
