name: terraform-plan

on:
  pull_request:
    paths:
      - "iac/terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - iac/terraform
          - iac/terraform/oci
          - iac/terraform/gcp
          - iac/terraform/aws
          - iac/terraform/cloudflare
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform fmt
        working-directory: ${{ matrix.module }}
        run: terraform fmt -check -diff

      - name: Terraform init (no backend)
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

      # NOTE: `terraform plan` requires credentials; skipped in CI.
      # Plans run locally via `iac/scripts/bootstrap-oci.sh` with bw-injected creds.
      - name: Plan (skipped — no creds in CI)
        run: echo "Plan skipped in CI — see docs/runbooks/ for local plan procedure."
