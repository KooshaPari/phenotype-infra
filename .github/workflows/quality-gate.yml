name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions: { pull-requests: read }
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 50 }
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go: ['crates/nanovms-core/**/*.go', 'crates/nanovms-core/go.mod', 'crates/nanovms-core/go.sum']
            rust: ['**/*.rs', '**/Cargo.toml', '**/Cargo.lock']
            any: ['**']

  go-vet:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/nanovms-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go vet ./...

  cargo-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Go (for libnvms_core.a build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: cargo check --workspace
      - run: cargo fmt --check

  go-lint:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/nanovms-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59

  security:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/nanovms-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
