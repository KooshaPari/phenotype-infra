name: observability-smoke

on:
  push:
    branches:
      - feat/t22-observability-pheno-tracing-otlp-2026-06-20
  pull_request:
    branches:
      - main

jobs:
  observability-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            iac/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('iac/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build observability crate
        working-directory: iac
        run: cargo build -p phenotype-infra-observability

      - name: Test observability crate (TracePort roundtrip)
        working-directory: iac
        run: cargo test -p phenotype-infra-observability --no-fail-fast
        env:
          RUST_LOG: info,phenotype_infra_observability=debug

      - name: Test report
        if: always()
        working-directory: iac
        run: |
          echo "T22 observability smoke test complete (pheno-tracing 0.1 substrate; OTLP adapter not yet shipped)."
