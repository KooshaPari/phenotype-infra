version: '3.8'
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports: ['4317:4317','4318:4318']
    volumes: ['./otel-config.yaml:/etc/otel-collector-config.yaml']
  phenotype-gateway:
    build: ./gateway
    ports: ['8080:8080']
    environment:
      - WORKOS_API_KEY=${WORKOS_API_KEY}
      - WORKOS_CLIENT_ID=${WORKOS_CLIENT_ID}
